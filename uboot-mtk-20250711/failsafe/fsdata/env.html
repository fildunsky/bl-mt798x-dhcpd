<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title data-i18n="env.title">U-BOOT ENV</title>
	<script src="/theme.js"></script>
	<link rel="stylesheet" href="/style.css">
	<script src="/i18n.js"></script>
	<script src="/main.js"></script>
	<script src="/env_js.js"></script>
</head>

<body onload="appInit('env')" data-page="env">
	<div class="app">
		<aside id="sidebar" class="sidebar"></aside>
		<div class="main">
			<div id="m">
				<div class="card-head">
					<div class="upload-hero" aria-hidden="true">
						<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
							<line x1="4" y1="21" x2="4" y2="14"></line>
							<line x1="4" y1="10" x2="4" y2="3"></line>
							<line x1="12" y1="21" x2="12" y2="12"></line>
							<line x1="12" y1="8" x2="12" y2="3"></line>
							<line x1="20" y1="21" x2="20" y2="16"></line>
							<line x1="20" y1="12" x2="20" y2="3"></line>
							<line x1="1" y1="14" x2="7" y2="14"></line>
							<line x1="9" y1="8" x2="15" y2="8"></line>
							<line x1="17" y1="16" x2="23" y2="16"></line>
						</svg>
					</div>
					<h1 data-i18n="env.title">U-BOOT ENV</h1>
					<p id="hint" data-i18n-html="env.hint">
						Manage <strong>U-Boot environment variables</strong>. Changes will be saved to storage.
					</p>
				</div>
				<div class="card-main">
				<div class="console-card env-card">
					<div class="env-toolbar">
                        <a id="env_count" class="env-count"></a>
						<a class="sep"> | </a>
                        <a id="env_size" class="env-size"></a>
						<a class="sep"> | </a>
						<a id="env_status" class="console-status"></a>
					</div>

						<div id="env_list" class="console-output env-output" aria-label="env list"></div>

						<div class="form-row form-row-2">
							<div class="field">
								<label for="env_name" data-i18n="env.label.name">Name:</label>
								<input id="env_name" class="field-control" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
							</div>
							<div class="field">
								<label for="env_value" data-i18n="env.label.value">Value:</label>
								<input id="env_value" class="field-control" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
							</div>
						</div>

						<div class="form-actions">
							<button type="button" class="button" onclick="envSet()" data-i18n="env.action.set">Add / Update</button>
							<button type="button" class="button button-warn" onclick="envUnset()" data-i18n="env.action.unset">Delete</button>
                            <button type="button" class="button" onclick="envRefresh()" data-i18n="env.action.refresh">Refresh</button>
						</div>

						<div class="form-row">
							<div class="field">
								<label for="env_file" data-i18n="env.label.file">Env file:</label>
								<input id="env_file" class="field-control" type="file" />
							</div>
						</div>
						<div class="form-actions">
                            <button type="button" class="button button-danger" onclick="envReset()" data-i18n="env.action.reset">Reset to defaults</button>
							<button type="button" class="button" onclick="envRestore()" data-i18n="env.action.restore">Restore</button>
						</div>
					</div>
				</div>
				<div class="card-foot">
					<div class="i w">
						<strong data-i18n="common.warnings">WARNINGS</strong>
						<ul>
							<li data-i18n="env.warn.1">Modifying environment variables may affect boot behavior.</li>
							<li data-i18n="env.warn.2">Do not power off during save or restore.</li>
							<li data-i18n="env.warn.3">Restore expects a binary U-Boot environment image (CRC + data).</li>
						</ul>
					</div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>
</body>

</html>
